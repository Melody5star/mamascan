<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MamaScan — Pregnancy Food Safety AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose: #C2587A;
    --rose-light: #F5D6E2;
    --rose-pale: #FDF0F5;
    --sage: #6B8F6E;
    --sage-light: #D4E8D5;
    --sage-pale: #F0F7F0;
    --amber: #C4893A;
    --amber-light: #FAE5C2;
    --amber-pale: #FEF8EE;
    --red: #B84040;
    --red-light: #FADADA;
    --red-pale: #FEF2F2;
    --cream: #FAF7F2;
    --warm-white: #FFFCFA;
    --text-dark: #2C2018;
    --text-mid: #6B5744;
    --text-light: #A09080;
    --border: rgba(44,32,24,0.10);
    --shadow-soft: 0 4px 24px rgba(194,88,122,0.10);
    --shadow-card: 0 2px 12px rgba(44,32,24,0.08);
    --radius: 16px;
    --radius-sm: 10px;
    --radius-pill: 999px;
  }

  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--cream);
    color: var(--text-dark);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  /* ── Layout ── */
  .app-shell {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    background: var(--warm-white);
    position: relative;
    display: flex;
    flex-direction: column;
  }

  @media (min-width: 900px) {
    body { padding: 32px 0; background: #F0EBE5; }
    .app-shell { border-radius: 28px; min-height: auto; box-shadow: 0 8px 48px rgba(44,32,24,0.16); }
  }

  /* ── Header ── */
  .header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--warm-white);
    z-index: 10;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--rose-light), var(--rose));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .logo-text {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--rose);
    letter-spacing: -0.3px;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--text-light);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-top: -2px;
  }

  .settings-btn {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    cursor: pointer;
    color: var(--text-light);
    transition: all 0.16s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .settings-btn:hover { border-color: var(--rose); color: var(--rose); background: var(--rose-pale); }
  .settings-btn.has-key { border-color: var(--sage-light); color: var(--sage); background: var(--sage-pale); }

  /* ── API Key Modal ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(44,32,24,0.4);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal-card {
    background: var(--warm-white);
    border-radius: 20px;
    padding: 28px 24px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 16px 64px rgba(44,32,24,0.2);
    animation: slideUp 0.25s ease;
  }

  .modal-title {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--text-dark);
    margin-bottom: 6px;
  }

  .modal-desc {
    font-size: 13px;
    color: var(--text-mid);
    line-height: 1.6;
    margin-bottom: 20px;
  }

  .modal-desc a { color: var(--rose); text-decoration: none; }
  .modal-desc a:hover { text-decoration: underline; }

  .api-key-input {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 14px;
    color: var(--text-dark);
    background: white;
    outline: none;
    transition: border-color 0.16s;
    font-family: 'DM Sans', monospace;
  }

  .api-key-input:focus { border-color: var(--rose); }
  .api-key-input::placeholder { color: var(--text-light); font-size: 13px; }

  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 16px;
  }

  .btn-modal-save {
    flex: 1;
    padding: 12px;
    border-radius: var(--radius-sm);
    background: var(--rose);
    color: white;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: background 0.16s;
  }

  .btn-modal-save:hover { background: #B04D6E; }

  .btn-modal-cancel {
    padding: 12px 20px;
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--text-mid);
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    border: 1.5px solid var(--border);
    cursor: pointer;
    transition: all 0.16s;
  }

  .btn-modal-cancel:hover { border-color: var(--text-mid); }

  .btn-modal-clear {
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    background: var(--red-pale);
    color: var(--red);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    border: 1px solid var(--red-light);
    cursor: pointer;
    transition: all 0.16s;
  }

  .btn-modal-clear:hover { background: var(--red-light); }

  .modal-key-status {
    font-size: 12px;
    margin-top: 8px;
    padding: 6px 10px;
    border-radius: 6px;
  }

  .key-saved { background: var(--sage-pale); color: var(--sage); }
  .key-missing { background: var(--amber-pale); color: var(--amber); }

  /* ── Stage Selector ── */
  .section {
    padding: 20px 24px;
  }

  .section-title {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-light);
    margin-bottom: 12px;
    font-weight: 500;
  }

  .stages-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }

  .stage-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 10px 4px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: transparent;
    cursor: pointer;
    transition: all 0.18s ease;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }

  .stage-btn:hover { border-color: var(--rose); background: var(--rose-pale); }

  .stage-btn.active {
    border-color: var(--rose);
    background: var(--rose-pale);
    box-shadow: 0 0 0 3px rgba(194,88,122,0.12);
  }

  .stage-icon { font-size: 18px; line-height: 1; }

  .stage-label {
    font-size: 10px;
    font-weight: 600;
    text-align: center;
    color: var(--text-mid);
    line-height: 1.3;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .stage-btn.active .stage-label { color: var(--rose); }

  /* ── Scan Zone ── */
  .scan-zone {
    padding: 0 24px 20px;
  }

  .upload-area {
    border: 2px dashed var(--rose-light);
    border-radius: var(--radius);
    background: var(--rose-pale);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 32px 20px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: center;
    position: relative;
    min-height: 180px;
  }

  .upload-area:hover { border-color: var(--rose); background: #FBECF3; }
  .upload-area.has-image { padding: 0; border-style: solid; border-color: var(--rose-light); cursor: default; }

  .upload-icon {
    width: 56px;
    height: 56px;
    background: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    box-shadow: var(--shadow-card);
  }

  .upload-title {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    color: var(--text-dark);
  }

  .upload-sub { font-size: 13px; color: var(--text-light); }

  .upload-btns {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }

  .btn-upload {
    padding: 9px 18px;
    border-radius: var(--radius-pill);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.16s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-primary {
    background: var(--rose);
    color: white;
  }
  .btn-primary:hover { background: #B04D6E; }

  .btn-secondary {
    background: white;
    color: var(--rose);
    border: 1.5px solid var(--rose-light);
  }
  .btn-secondary:hover { border-color: var(--rose); background: var(--rose-pale); }

  .preview-img {
    width: 100%;
    max-height: 240px;
    object-fit: cover;
    border-radius: calc(var(--radius) - 2px);
    display: block;
  }

  .preview-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.45);
    border-radius: calc(var(--radius) - 2px);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .upload-area:hover .preview-overlay { opacity: 1; }

  .preview-overlay span {
    color: white;
    font-size: 13px;
    font-weight: 500;
    background: rgba(255,255,255,0.2);
    padding: 6px 14px;
    border-radius: var(--radius-pill);
    border: 1px solid rgba(255,255,255,0.3);
    cursor: pointer;
  }

  .preview-overlay span:hover { background: rgba(255,255,255,0.35); }

  /* ── File size warning ── */
  .file-warning {
    font-size: 12px;
    color: var(--amber);
    background: var(--amber-pale);
    border: 1px solid var(--amber-light);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .scan-btn {
    width: 100%;
    padding: 16px;
    margin-top: 12px;
    border-radius: var(--radius);
    background: var(--rose);
    color: white;
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    letter-spacing: 0.2px;
    border: none;
    cursor: pointer;
    transition: all 0.18s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    -webkit-tap-highlight-color: transparent;
  }

  .scan-btn:hover:not(:disabled) { background: #B04D6E; transform: translateY(-1px); box-shadow: var(--shadow-soft); }
  .scan-btn:active:not(:disabled) { transform: translateY(0); }
  .scan-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .scan-another-btn {
    width: 100%;
    padding: 13px;
    margin-top: 10px;
    border-radius: var(--radius);
    background: transparent;
    color: var(--rose);
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    border: 1.5px solid var(--rose-light);
    cursor: pointer;
    transition: all 0.18s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    -webkit-tap-highlight-color: transparent;
  }

  .scan-another-btn:hover { border-color: var(--rose); background: var(--rose-pale); }

  /* ── Loading ── */
  .loading-card {
    background: white;
    border-radius: var(--radius);
    padding: 32px 24px;
    text-align: center;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-card);
  }

  .pulse-ring {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--rose-light);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    animation: pulse 1.5s ease-in-out infinite;
    font-size: 28px;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.08); opacity: 0.8; }
  }

  .loading-text {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--text-dark);
    margin-bottom: 6px;
  }

  .loading-sub { font-size: 13px; color: var(--text-light); }
  .loading-hint { font-size: 12px; color: var(--text-light); margin-top: 6px; font-style: italic; }

  .progress-dots { display: flex; justify-content: center; gap: 6px; margin-top: 16px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--rose-light); animation: bounce 1.2s ease infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100% { transform: scale(0.7); background: var(--rose-light); } 40% { transform: scale(1); background: var(--rose); } }

  /* ── Results ── */
  .result-card {
    background: white;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-card);
    animation: slideUp 0.35s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .result-food-name {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--text-dark);
    line-height: 1.3;
  }

  .result-stage-tag {
    font-size: 11px;
    color: var(--text-light);
    font-weight: 500;
    letter-spacing: 0.3px;
    margin-top: 3px;
  }

  .safety-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 6px 14px;
    border-radius: var(--radius-pill);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .badge-safe { background: var(--sage-light); color: var(--sage); }
  .badge-caution { background: var(--amber-light); color: var(--amber); }
  .badge-avoid { background: var(--red-light); color: var(--red); }

  .result-body { padding: 16px 20px; }

  .result-headline {
    font-family: 'DM Serif Display', serif;
    font-size: 16px;
    color: var(--text-dark);
    margin-bottom: 10px;
    line-height: 1.4;
  }

  .result-explanation {
    font-size: 14px;
    color: var(--text-mid);
    line-height: 1.7;
    margin-bottom: 16px;
  }

  .result-section-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    color: var(--text-light);
    font-weight: 600;
    margin-bottom: 8px;
  }

  .nutrients-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }

  .nutrient-item {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    background: var(--sage-pale);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
  }

  .nutrient-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--sage); margin-top: 5px; flex-shrink: 0; }
  .nutrient-name { font-size: 13px; font-weight: 600; color: var(--text-dark); }
  .nutrient-benefit { font-size: 12px; color: var(--text-light); margin-top: 1px; }

  .portion-box {
    background: var(--amber-pale);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    border-left: 3px solid var(--amber);
  }

  .portion-icon { font-size: 18px; }
  .portion-text { font-size: 13px; color: var(--text-mid); }

  .alternatives-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }

  .alt-tag {
    background: white;
    border: 1.5px solid var(--rose-light);
    border-radius: var(--radius-pill);
    padding: 5px 12px;
    font-size: 12px;
    color: var(--rose);
    font-weight: 500;
  }

  .stage-note-box {
    background: var(--rose-pale);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    border-left: 3px solid var(--rose);
  }

  .stage-note-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .stage-note-text { font-size: 13px; color: var(--text-mid); line-height: 1.5; }

  .confidence-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .confidence-label { font-size: 11px; color: var(--text-light); }
  .confidence-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: var(--radius-pill);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .conf-high { background: var(--sage-light); color: var(--sage); }
  .conf-medium { background: var(--amber-light); color: var(--amber); }
  .conf-low { background: var(--red-light); color: var(--red); }

  /* ── No-key banner ── */
  .no-key-banner {
    margin: 0 24px 16px;
    background: var(--amber-pale);
    border: 1px solid var(--amber-light);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .no-key-banner-icon { font-size: 16px; flex-shrink: 0; }
  .no-key-banner-text { font-size: 13px; color: var(--text-mid); line-height: 1.5; }
  .no-key-banner-btn {
    display: inline-block;
    margin-top: 6px;
    padding: 5px 12px;
    background: var(--amber);
    color: white;
    border-radius: var(--radius-pill);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    font-family: inherit;
  }
  .no-key-banner-btn:hover { background: #B07A30; }

  /* ── Disclaimer ── */
  .disclaimer {
    margin: 0 24px 20px;
    background: #F7F3EE;
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }

  .disclaimer-icon { font-size: 14px; flex-shrink: 0; margin-top: 2px; }
  .disclaimer-text { font-size: 11.5px; color: var(--text-light); line-height: 1.5; }

  /* ── History ── */
  .history-section {
    padding: 0 24px 24px;
    border-top: 1px solid var(--border);
    margin-top: 4px;
  }

  .history-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 12px;
  }

  .history-clear-btn {
    font-size: 11px;
    color: var(--text-light);
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    padding: 4px 8px;
    border-radius: 6px;
    transition: all 0.14s;
  }

  .history-clear-btn:hover { color: var(--red); background: var(--red-pale); }

  .history-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 12px 0 4px;
    scrollbar-width: none;
  }
  .history-scroll::-webkit-scrollbar { display: none; }

  .history-item {
    flex-shrink: 0;
    background: white;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    cursor: pointer;
    transition: all 0.16s ease;
    min-width: 100px;
    max-width: 130px;
  }

  .history-item:hover { border-color: var(--rose); background: var(--rose-pale); }
  .history-item.active { border-color: var(--rose); background: var(--rose-pale); }

  .history-food {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dark);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }

  .history-badge {
    display: inline-block;
    padding: 2px 7px;
    border-radius: var(--radius-pill);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }

  /* ── Error ── */
  .error-card {
    background: var(--red-pale);
    border: 1px solid var(--red-light);
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
    animation: slideUp 0.3s ease;
  }

  .error-icon { font-size: 28px; margin-bottom: 10px; }

<body>
<div id="root"></div>

<script type="module">
import { createElement as h, useState, useRef, useCallback, useEffect } from 'https://esm.sh/react@18';
import { createRoot } from 'https://esm.sh/react-dom@18/client';

const STORAGE_KEY_API = 'mamascan_api_key';
const STORAGE_KEY_HISTORY = 'mamascan_history';
const MAX_FILE_SIZE_MB = 5;
const FETCH_TIMEOUT_MS = 45000;

const STAGES = [
  { id: 'pre',  icon: '🌱', label: 'Pre\nPreg',      full: 'Pre-Pregnancy' },
  { id: 't1',   icon: '🫧', label: 'T1\nWk 1–12',   full: 'Trimester 1' },
  { id: 't2',   icon: '🌸', label: 'T2\nWk 13–26',  full: 'Trimester 2' },
  { id: 't3',   icon: '🌷', label: 'T3\nWk 27–40',  full: 'Trimester 3' },
  { id: 'post', icon: '🤱', label: 'Post\nBF',       full: 'Postpartum / Breastfeeding' },
];

const STAGE_CONTEXT = {
  pre:  'Pre-Pregnancy (trying to conceive). Focus on: folate (400mcg/day), iron, omega-3, healthy weight. Avoid: alcohol, high mercury fish, excess vitamin A from animal sources.',
  t1:   'Trimester 1 (weeks 1-12). Critical: folic acid (600mcg), B6 for nausea. Strictly avoid: raw/undercooked meat & fish (listeria, toxoplasmosis), soft unpasteurised cheeses, deli meats, raw eggs, alcohol, caffeine >200mg/day, high-mercury fish (shark, swordfish, king mackerel).',
  t2:   'Trimester 2 (weeks 13-26). Focus on: iron (27mg/day), calcium (1000mg), DHA omega-3, vitamin D. Watch: gestational diabetes risk — limit added sugars, refined carbs. Still avoid: listeria-risk foods, high mercury fish, alcohol, >200mg caffeine.',
  t3:   'Trimester 3 (weeks 27-40). Focus on: protein for fetal growth, calcium for bone development, magnesium, vitamin K. Watch: heartburn triggers (spicy, acidic, fatty foods), fluid retention (excess sodium). Avoid: raw fish, deli meats, alcohol, high mercury fish.',
  post: 'Postpartum / Breastfeeding. Calorie needs increased +300-500/day. Focus on: hydration (3L/day), calcium, DHA for breast milk quality, iron recovery. Avoid: alcohol (or wait 2h after drinking before feeding), high caffeine (>300mg), high mercury fish. Note allergy transmission: peanuts, dairy in some sensitive babies.',
};

function buildPrompt(stageId) {
  const stage = STAGES.find(s => s.id === stageId);
  const ctx = STAGE_CONTEXT[stageId];
  return `You are MamaScan, a warm and knowledgeable pregnancy nutrition specialist.

Analyze the food in this image for a woman in: ${stage.full}.

Stage context for your analysis: ${ctx}

Return ONLY valid JSON (no markdown, no code fences, no extra text) with EXACTLY this structure:
{
  "food_identified": "name of food(s) visible in image",
  "confidence": "high or medium or low",
  "safety_status": "safe or caution or avoid",
  "safety_label": "SAFE or USE CAUTION or AVOID",
  "headline": "short punchy headline max 8 words",
  "explanation": "2-4 sentences explaining safety/nutrition for this specific stage, warm and clear",
  "key_nutrients": [
    { "name": "Nutrient name", "benefit": "why it matters at this stage, max 10 words" }
  ],
  "portion_guidance": "specific portion advice string, or null if avoid status",
  "safe_alternatives": ["alternative 1", "alternative 2"],
  "stage_note": "one sentence specific insight for this stage",
  "is_food": true
}

If the image doesn't contain food, return: {"is_food": false, "message": "brief message"}
Be accurate, evidence-based (NHS/CDC/ACOG guidelines), and genuinely helpful.`;
}

function friendlyError(status, message) {
  if (status === 401) return 'Invalid API key. Please check your key in settings and try again.';
  if (status === 403) return 'API key does not have permission. Ensure you\'re using a valid Anthropic API key.';
  if (status === 429) return 'Rate limit reached. Please wait a moment and try again.';
  if (status === 529) return 'Claude is temporarily overloaded. Please try again in a moment.';
  if (status === 413) return 'Image is too large for the API. Try a smaller image.';
  if (message && message.includes('timed out')) return 'Analysis timed out after 45 seconds. Please try again.';
  if (message && message.includes('NetworkError')) return 'Network error — check your internet connection and try again.';
  return `Analysis failed (${status || 'network error'}). Please try again.`;
}

async function compressImage(file) {
  // Compress images larger than MAX_FILE_SIZE_MB
  return new Promise((resolve) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      const canvas = document.createElement('canvas');
      let { width, height } = img;
      const MAX_DIM = 1600;
      if (width > MAX_DIM || height > MAX_DIM) {
        const ratio = Math.min(MAX_DIM / width, MAX_DIM / height);
        width = Math.round(width * ratio);
        height = Math.round(height * ratio);
      }
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.82);
    };
    img.onerror = () => resolve(file);
    img.src = url;
  });
}

function toBase64(blob) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(blob);
  });
}

async function analyzeFood(imageFile, stageId, apiKey) {
  const prompt = buildPrompt(stageId);

  // Compress if needed
  let blob = imageFile;
  const sizeMB = imageFile.size / (1024 * 1024);
  if (sizeMB > MAX_FILE_SIZE_MB) {
    blob = await compressImage(imageFile);
  }

  const base64 = await toBase64(blob);
  const mimeType = blob.type || 'image/jpeg';

  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), FETCH_TIMEOUT_MS);

  let response;
  try {
    response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 1024,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: mimeType, data: base64 } },
            { type: 'text', text: prompt }
          ]
        }]
      }),
      signal: controller.signal,
    });
  } catch (err) {
    if (err.name === 'AbortError') throw new Error('timed out');
    throw new Error('NetworkError: ' + err.message);
  } finally {
    clearTimeout(timeoutId);
  }

  if (!response.ok) {
    throw Object.assign(new Error('API error'), { status: response.status });
  }

  const data = await response.json();
  const text = data.content.map(b => b.text || '').join('');
  const clean = text.replace(/```json|```/g, '').trim();
  return JSON.parse(clean);
}

// ── Components ──

function SafetyBadge({ status, label }) {
  const cls = status === 'safe' ? 'badge-safe' : status === 'caution' ? 'badge-caution' : 'badge-avoid';
  const icon = status === 'safe' ? '✓' : status === 'caution' ? '!' : '✕';
  return h('span', {
    className: `safety-badge ${cls}`,
    role: 'status',
    'aria-label': `Safety: ${label || status}`,
  }, icon + ' ' + (label || status.toUpperCase()));
}

function HistoryBadge({ status }) {
  const cls = status === 'safe' ? 'badge-safe' : status === 'caution' ? 'badge-caution' : 'badge-avoid';
  const label = status === 'safe' ? 'Safe' : status === 'caution' ? 'Caution' : 'Avoid';
  return h('span', { className: `history-badge ${cls}` }, label);
}

function ResultCard({ result, stageFull }) {
  if (!result.is_food) {
    return h('div', { className: 'error-card', role: 'alert' },
      h('div', { className: 'error-icon' }, '🔍'),
      h('div', { className: 'error-title' }, 'No food detected'),
      h('div', { className: 'error-text' }, result.message || 'Please take a clearer photo of the food you want to analyze.')
    );
  }

  const confClass = result.confidence === 'high' ? 'conf-high' : result.confidence === 'medium' ? 'conf-medium' : 'conf-low';

  return h('div', { className: 'result-card', role: 'region', 'aria-label': `Analysis result for ${result.food_identified}` },
    h('div', { className: 'result-header' },
      h('div', null,
        h('div', { className: 'result-food-name' }, result.food_identified),
        h('div', { className: 'result-stage-tag' }, '📍 ' + stageFull)
      ),
      h(SafetyBadge, { status: result.safety_status, label: result.safety_label })
    ),
    h('div', { className: 'result-body' },
      result.headline && h('div', { className: 'result-headline' }, result.headline),
      h('div', { className: 'result-explanation' }, result.explanation),

      result.key_nutrients && result.key_nutrients.length > 0 && h('div', null,
        h('div', { className: 'result-section-title' }, '✦ Key Nutrients'),
        h('div', { className: 'nutrients-list' },
          ...result.key_nutrients.slice(0, 4).map((n, i) =>
            h('div', { key: i, className: 'nutrient-item' },
              h('div', { className: 'nutrient-dot' }),
              h('div', null,
                h('div', { className: 'nutrient-name' }, n.name),
                h('div', { className: 'nutrient-benefit' }, n.benefit)
              )
            )
          )
        )
      ),

      result.portion_guidance && h('div', { className: 'portion-box', role: 'note', 'aria-label': 'Portion guidance' },
        h('span', { className: 'portion-icon', 'aria-hidden': 'true' }, '🍽'),
        h('span', { className: 'portion-text' }, result.portion_guidance)
      ),

      result.safe_alternatives && result.safe_alternatives.length > 0 && h('div', null,
        h('div', { className: 'result-section-title' }, '→ Safe Alternatives'),
        h('div', { className: 'alternatives-list' },
          ...result.safe_alternatives.map((alt, i) =>
            h('span', { key: i, className: 'alt-tag' }, alt)
          )
        )
      ),

      result.stage_note && h('div', { className: 'stage-note-box' },
        h('span', { className: 'stage-note-icon', 'aria-hidden': 'true' }, '💗'),
        h('span', { className: 'stage-note-text' }, result.stage_note)
      ),

      h('div', { className: 'confidence-row' },
        h('span', { className: 'confidence-label' }, 'Identification confidence:'),
        h('span', { className: `confidence-badge ${confClass}`, 'aria-label': `Confidence level: ${result.confidence || 'medium'}` },
          result.confidence || 'medium'
        )
      )
    )
  );
}

function ApiKeyModal({ onClose, onSave }) {
  const [key, setKey] = useState(() => localStorage.getItem(STORAGE_KEY_API) || '');
  const savedKey = localStorage.getItem(STORAGE_KEY_API);

  function handleSave() {
    const trimmed = key.trim();
    if (!trimmed) return;
    localStorage.setItem(STORAGE_KEY_API, trimmed);
    onSave(trimmed);
    onClose();
  }

  function handleClear() {
    localStorage.removeItem(STORAGE_KEY_API);
    setKey('');
    onSave('');
  }

  function handleKeyDown(e) {
    if (e.key === 'Enter') handleSave();
    if (e.key === 'Escape') onClose();
  }

  return h('div', {
    className: 'modal-overlay',
    onClick: (e) => e.target === e.currentTarget && onClose(),
    role: 'dialog',
    'aria-modal': 'true',
    'aria-labelledby': 'modal-title',
  },
    h('div', { className: 'modal-card' },
      h('div', { className: 'modal-title', id: 'modal-title' }, '🔑 API Key Settings'),
      h('div', { className: 'modal-desc' },
        'MamaScan uses the Anthropic Claude API. Your key is stored only in your browser\'s local storage and never sent to any server other than Anthropic.',
        h('br'), h('br'),
        'Get your API key at ',
        h('a', { href: 'https://console.anthropic.com', target: '_blank', rel: 'noopener noreferrer' }, 'console.anthropic.com'),
        '.'
      ),
      h('input', {
        className: 'api-key-input',
        type: 'password',
        placeholder: 'sk-ant-api03-…',
        value: key,
        onChange: (e) => setKey(e.target.value),
        onKeyDown: handleKeyDown,
        'aria-label': 'Anthropic API key',
        autoComplete: 'off',
        spellCheck: false,
      }),
      savedKey
        ? h('div', { className: 'modal-key-status key-saved' }, '✓ A key is currently saved')
        : h('div', { className: 'modal-key-status key-missing' }, '⚠ No key saved — the app won\'t work without one'),
      h('div', { className: 'modal-actions' },
        h('button', { className: 'btn-modal-save', onClick: handleSave, 'aria-label': 'Save API key' }, 'Save Key'),
        savedKey && h('button', { className: 'btn-modal-clear', onClick: handleClear, 'aria-label': 'Clear saved API key' }, 'Clear'),
        h('button', { className: 'btn-modal-cancel', onClick: onClose, 'aria-label': 'Cancel' }, 'Cancel'),
      )
    )
  );
}

function App() {
  const [stage, setStage] = useState('t1');
  const [imageFile, setImageFile] = useState(null);
  const [imagePreview, setImagePreview] = useState(null);
  const [fileSizeMB, setFileSizeMB] = useState(0);
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);
  const [errorStatus, setErrorStatus] = useState(null);
  const [history, setHistory] = useState(() => {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY_HISTORY)) || []; }
    catch { return []; }
  });
  const [activeHistoryIdx, setActiveHistoryIdx] = useState(null);
  const [showModal, setShowModal] = useState(false);
  const [apiKey, setApiKey] = useState(() => localStorage.getItem(STORAGE_KEY_API) || '');

  const fileInputRef = useRef();
  const cameraInputRef = useRef();

  // Persist history to localStorage whenever it changes
  useEffect(() => {
    try { localStorage.setItem(STORAGE_KEY_HISTORY, JSON.stringify(history)); }
    catch {}
  }, [history]);

  const handleFile = useCallback((file) => {
    if (!file || !file.type.startsWith('image/')) return;
    setImageFile(file);
    setResult(null);
    setError(null);
    setErrorStatus(null);
    setActiveHistoryIdx(null);
    setFileSizeMB(file.size / (1024 * 1024));
    const url = URL.createObjectURL(file);
    setImagePreview(url);
  }, []);

  const resetScan = useCallback(() => {
    setImageFile(null);
    setImagePreview(null);
    setResult(null);
    setError(null);
    setErrorStatus(null);
    setActiveHistoryIdx(null);
    setFileSizeMB(0);
    if (fileInputRef.current) fileInputRef.current.value = '';
    if (cameraInputRef.current) cameraInputRef.current.value = '';
  }, []);

  const onFileChange = (e) => handleFile(e.target.files[0]);

  const onScan = async () => {
    if (!imageFile) return;
    if (!apiKey) { setShowModal(true); return; }
    setLoading(true);
    setResult(null);
    setError(null);
    setErrorStatus(null);
    setActiveHistoryIdx(null);
    try {
      const analysis = await analyzeFood(imageFile, stage, apiKey);
      setResult(analysis);
      if (analysis.is_food !== false) {
        const entry = { food: analysis.food_identified, status: analysis.safety_status, result: analysis, stageId: stage };
        setHistory(prev => {
          const updated = [entry, ...prev].slice(0, 5);
          return updated;
        });
      }
    } catch (err) {
      setErrorStatus(err.status || null);
      setError(friendlyError(err.status, err.message));
    } finally {
      setLoading(false);
    }
  };

  const clearHistory = () => {
    setHistory([]);
    setActiveHistoryIdx(null);
    if (result === null && activeHistoryIdx !== null) setResult(null);
  };

  const displayResult = activeHistoryIdx !== null ? history[activeHistoryIdx]?.result : result;
  const displayStageId = activeHistoryIdx !== null ? history[activeHistoryIdx]?.stageId : stage;
  const displayStageFull = STAGES.find(s => s.id === displayStageId)?.full;

  const needsKey = !apiKey;

  return h('div', { className: 'app-shell' },

    // API Key Modal
    showModal && h(ApiKeyModal, {
      onClose: () => setShowModal(false),
      onSave: (k) => setApiKey(k),
    }),

    // Header
    h('header', { className: 'header', role: 'banner' },
      h('div', { className: 'logo' },
        h('div', { className: 'logo-icon', 'aria-hidden': 'true' }, '🌺'),
        h('div', null,
          h('div', { className: 'logo-text' }, 'MamaScan'),
          h('div', { className: 'logo-sub' }, 'Pregnancy Food AI')
        )
      ),
      h('button', {
        className: `settings-btn ${apiKey ? 'has-key' : ''}`,
        onClick: () => setShowModal(true),
        'aria-label': apiKey ? 'API key configured — open settings' : 'Open API key settings',
        title: apiKey ? 'API key saved' : 'Set API key',
      }, '⚙')
    ),

    // No-key banner
    needsKey && h('div', { className: 'no-key-banner', role: 'alert' },
      h('span', { className: 'no-key-banner-icon', 'aria-hidden': 'true' }, '🔑'),
      h('div', { className: 'no-key-banner-text' },
        'An Anthropic API key is required to use MamaScan.',
        h('br'),
        h('button', {
          className: 'no-key-banner-btn',
          onClick: () => setShowModal(true),
          'aria-label': 'Open settings to add your API key',
        }, 'Add API Key →')
      )
    ),

    // Stage selector
    h('section', { className: 'section', style: { paddingBottom: '12px' }, 'aria-label': 'Select pregnancy stage' },
      h('div', { className: 'section-title' }, 'Your Pregnancy Stage'),
      h('div', { className: 'stages-grid', role: 'radiogroup', 'aria-label': 'Pregnancy stage' },
        ...STAGES.map(s =>
          h('button', {
            key: s.id,
            className: `stage-btn ${stage === s.id ? 'active' : ''}`,
            onClick: () => { setStage(s.id); setResult(null); setActiveHistoryIdx(null); },
            role: 'radio',
            'aria-checked': stage === s.id,
            'aria-label': s.full,
            title: s.full,
          },
            h('span', { className: 'stage-icon', 'aria-hidden': 'true' }, s.icon),
            h('span', { className: 'stage-label', style: { whiteSpace: 'pre' } }, s.label)
          )
        )
      )
    ),

    // Scan Zone
    h('section', { className: 'scan-zone', 'aria-label': 'Scan food' },
      h('div', { className: 'section-title', style: { marginBottom: '10px' } }, 'Scan Your Food'),

      h('div', {
        className: `upload-area ${imagePreview ? 'has-image' : ''}`,
        onClick: () => !imagePreview && fileInputRef.current.click(),
        role: imagePreview ? 'img' : 'button',
        'aria-label': imagePreview ? 'Food image preview' : 'Click to upload a food photo',
        tabIndex: imagePreview ? -1 : 0,
        onKeyDown: imagePreview ? undefined : (e) => e.key === 'Enter' && fileInputRef.current.click(),
      },
        imagePreview
          ? h('div', { style: { position: 'relative', width: '100%' } },
              h('img', { src: imagePreview, className: 'preview-img', alt: 'Selected food photo preview' }),
              h('div', { className: 'preview-overlay', 'aria-hidden': 'true' },
                h('span', {
                  onClick: (e) => { e.stopPropagation(); fileInputRef.current.click(); },
                  title: 'Upload a different file',
                }, '📁 Change'),
                'capture' in HTMLInputElement.prototype &&
                  h('span', {
                    onClick: (e) => { e.stopPropagation(); cameraInputRef.current.click(); },
                    title: 'Take a photo with camera',
                  }, '📷 Camera')
              )
            )
          : h('div', { style: { display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '10px' } },
              h('div', { className: 'upload-icon', 'aria-hidden': 'true' }, '📷'),
              h('div', { className: 'upload-title' }, 'Take or upload a food photo'),
              h('div', { className: 'upload-sub' }, 'JPG, PNG, WEBP · up to 20 MB'),
              h('div', { className: 'upload-btns' },
                h('button', {
                  className: 'btn-upload btn-primary',
                  onClick: (e) => { e.stopPropagation(); fileInputRef.current.click(); },
                  'aria-label': 'Upload photo from files',
                }, '📁 Upload'),
                h('button', {
                  className: 'btn-upload btn-secondary',
                  onClick: (e) => { e.stopPropagation(); cameraInputRef.current.click(); },
                  'aria-label': 'Take photo with camera',
                }, '📷 Camera')
              )
            )
      ),

      // Large file warning
      fileSizeMB > MAX_FILE_SIZE_MB && h('div', { className: 'file-warning', role: 'status' },
        '⚡ ',
        `Large image (${fileSizeMB.toFixed(1)} MB) will be automatically compressed before sending.`
      ),

      h('input', { ref: fileInputRef, id: 'file-input', type: 'file', accept: 'image/*', onChange: onFileChange, 'aria-hidden': 'true' }),
      h('input', { ref: cameraInputRef, id: 'camera-input', type: 'file', accept: 'image/*', capture: 'environment', onChange: onFileChange, 'aria-hidden': 'true' }),

      h('button', {
        className: 'scan-btn',
        disabled: !imageFile || loading,
        onClick: onScan,
        'aria-label': loading ? 'Analyzing food, please wait' : 'Scan food for pregnancy safety',
        'aria-busy': loading,
      },
        loading ? '⏳ Analyzing…' : '🔍 Scan for Safety'
      ),

      // Scan Another button (shown after result)
      (result || activeHistoryIdx !== null) && !loading && h('button', {
        className: 'scan-another-btn',
        onClick: resetScan,
        'aria-label': 'Clear current result and scan a new food',
      }, '+ Scan Another Food')
    ),

    // Disclaimer
    h('aside', { className: 'disclaimer', role: 'note', 'aria-label': 'Medical disclaimer' },
      h('span', { className: 'disclaimer-icon', 'aria-hidden': 'true' }, 'ℹ'),
      h('span', { className: 'disclaimer-text' }, 'MamaScan provides general nutritional guidance. Always consult your OB/GYN or midwife for personalised medical advice. Guidelines based on NHS, CDC & ACOG recommendations.')
    ),

    // Results area
    h('main', { style: { padding: '0 24px 20px' }, 'aria-live': 'polite', 'aria-atomic': 'true' },
      loading && h('div', { className: 'loading-card', role: 'status', 'aria-label': 'Analyzing food' },
        h('div', { className: 'pulse-ring', 'aria-hidden': 'true' }, '🍽'),
        h('div', { className: 'loading-text' }, 'Analyzing your food…'),
        h('div', { className: 'loading-sub' }, `Checking safety for ${STAGES.find(s => s.id === stage)?.full}`),
        h('div', { className: 'loading-hint' }, 'This usually takes 10–20 seconds'),
        h('div', { className: 'progress-dots', 'aria-hidden': 'true' },
          h('div', { className: 'dot' }),
          h('div', { className: 'dot' }),
          h('div', { className: 'dot' })
        )
      ),

      error && !loading && h('div', { className: 'error-card', role: 'alert' },
        h('div', { className: 'error-icon', 'aria-hidden': 'true' },
          errorStatus === 401 ? '🔑' : errorStatus === 429 ? '⏱' : '⚠'
        ),
        h('div', { className: 'error-title' },
          errorStatus === 401 ? 'Invalid API Key' : errorStatus === 429 ? 'Rate Limited' : 'Analysis Failed'
        ),
        h('div', { className: 'error-text' }, error),
        errorStatus === 401
          ? h('button', {
              className: 'retry-btn',
              onClick: () => setShowModal(true),
              'aria-label': 'Open API key settings',
              style: { background: 'var(--amber)' },
            }, '⚙ Check API Key')
          : h('button', {
              className: 'retry-btn',
              onClick: onScan,
              'aria-label': 'Retry the analysis',
            }, '↺ Try Again')
      ),

      displayResult && !loading && h(ResultCard, { result: displayResult, stageFull: displayStageFull })
    ),

    // History
    history.length > 0 && h('section', { className: 'history-section', 'aria-label': 'Recent scans' },
      h('div', { className: 'history-header' },
        h('div', { className: 'section-title', style: { marginBottom: 0 } }, '🕐 Recent Scans'),
        h('button', {
          className: 'history-clear-btn',
          onClick: clearHistory,
          'aria-label': 'Clear scan history',
        }, 'Clear all')
      ),
      h('div', { className: 'history-scroll', role: 'list', 'aria-label': 'Scan history' },
        ...history.map((item, i) =>
          h('div', {
            key: i,
            className: `history-item ${activeHistoryIdx === i ? 'active' : ''}`,
            onClick: () => {
              setActiveHistoryIdx(i);
              setResult(null);
            },
            role: 'listitem button',
            tabIndex: 0,
            'aria-label': `${item.food} — ${item.status}`,
            'aria-pressed': activeHistoryIdx === i,
            onKeyDown: (e) => e.key === 'Enter' && (setActiveHistoryIdx(i), setResult(null)),
          },
            h('div', { className: 'history-food' }, item.food),
            h(HistoryBadge, { status: item.status })
          )
        )
      )
    )
  );
}

createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
